name: publish

# Publishes to PyPI when a GitHub Release is published. Uses PyPI Trusted
# Publishing (OIDC) -- no API token is stored in the repo. One-time setup:
# on PyPI, add this repo (seratsaad/astrodata-mcp), workflow "publish.yml",
# environment "pypi" as a trusted publisher for the project.

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build-and-publish:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
