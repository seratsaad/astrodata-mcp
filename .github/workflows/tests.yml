name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  offline:
    name: offline unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with dev extras)
        run: pip install -e ".[dev]"
      - name: Run offline tests (no network)
        run: |
          python tests/test_adql.py
          python tests/test_tap_retry.py
          python tests/test_validation.py
          python tests/test_epoch.py
          python tests/test_properties.py
          python tests/test_parsing.py
      - name: Import server (core tools register)
        run: python -c "import asyncio; from astrodata_mcp.server import mcp; assert len(asyncio.run(mcp.list_tools())) == 19"
